<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Hierarchical Universe</title>
  
  <!-- MathJax 3: load first, before any rendering -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$']],
        displayMath: [['$$', '$$']],
        processEscapes: false
      },
      startup: {
        typeset: false   // we call typesetPromise manually after markdown is rendered
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  
  <!-- marked.js for markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --border: #30363d;
      --text: #c9d1d9;
      --text-secondary: #8b949e;
      --text-heading: #e6edf3;
      --link: #58a6ff;
      --link-hover: #79c0ff;
      --accent: #f78166;
      --accent-secondary: #d2a8ff;
      --code-bg: #1a1f2b;
      --table-stripe: #161b22;
      --toc-width: 280px;
      --content-max-width: 820px;
      --font-serif: 'Georgia', 'Times New Roman', serif;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-serif);
      font-size: 17px;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }
    #app { display: flex; min-height: 100vh; }
    #sidebar {
      width: var(--toc-width); min-width: var(--toc-width);
      background: var(--bg-secondary); border-right: 1px solid var(--border);
      position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; z-index: 100;
      padding: 24px 20px 40px; transition: transform 0.3s ease;
    }
    #sidebar-header {
      font-family: var(--font-sans); font-size: 14px; font-weight: 700;
      color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }
    #sidebar nav { font-family: var(--font-sans); font-size: 13px; }
    #sidebar nav a {
      display: block; color: var(--text-secondary); text-decoration: none;
      padding: 4px 0; transition: color 0.15s; line-height: 1.5;
    }
    #sidebar nav a:hover { color: var(--link-hover); }
    #sidebar nav a.active { color: var(--accent); font-weight: 600; }
    #sidebar nav a.toc-part {
      font-weight: 700; color: var(--text-heading); margin-top: 12px;
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    #sidebar nav a.toc-section { padding-left: 12px; font-size: 12px; }
    #sidebar-toggle {
      display: none; position: fixed; top: 12px; left: 12px; z-index: 200;
      background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text);
      font-size: 24px; width: 42px; height: 42px; border-radius: 8px; cursor: pointer;
      align-items: center; justify-content: center;
    }
    #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
    #main { margin-left: var(--toc-width); flex: 1; max-width: var(--content-max-width); padding: 48px 48px 80px; width: 100%; }
    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-sans); color: var(--text-heading);
      line-height: 1.3; margin-top: 2em; margin-bottom: 0.6em;
    }
    h1 { font-size: 2.2em; font-weight: 800; letter-spacing: -0.02em; margin-top: 0; }
    h2 { font-size: 1.6em; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    h3 { font-size: 1.25em; font-weight: 600; }
    p { margin-bottom: 1.2em; }
    strong { color: var(--text-heading); }
    em { color: var(--accent-secondary); font-style: italic; }
    a { color: var(--link); text-decoration: none; }
    a:hover { color: var(--link-hover); text-decoration: underline; }
    code { font-family: var(--font-mono); font-size: 0.88em; background: var(--code-bg); padding: 2px 6px; border-radius: 4px; }
    pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; overflow-x: auto; margin: 1.2em 0; line-height: 1.5; }
    pre code { background: none; padding: 0; font-size: 0.85em; }
    table { width: 100%; border-collapse: collapse; margin: 1.5em 0; font-size: 0.92em; font-family: var(--font-sans); }
    th, td { padding: 10px 14px; border: 1px solid var(--border); text-align: left; }
    th { background: var(--bg-tertiary); font-weight: 700; color: var(--text-heading); }
    tr:nth-child(even) td { background: var(--table-stripe); }
    blockquote {
      border-left: 3px solid var(--accent); margin: 1.2em 0; padding: 8px 20px;
      color: var(--text-secondary); background: var(--bg-secondary); border-radius: 0 8px 8px 0;
    }
    hr { border: none; border-top: 1px solid var(--border); margin: 2.5em 0; }
    ul, ol { margin: 0.8em 0 1.2em 1.5em; }
    li { margin-bottom: 0.3em; }
    mjx-container { overflow-x: auto; overflow-y: hidden; }
    #footer { margin-top: 60px; padding-top: 24px; border-top: 1px solid var(--border); font-family: var(--font-sans); font-size: 13px; color: var(--text-secondary); }
    #loading {
      display: flex; align-items: center; justify-content: center; height: 60vh;
      font-family: var(--font-sans); color: var(--text-secondary); font-size: 1.1em;
    }
    #loading::after {
      content: ''; width: 24px; height: 24px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-left: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error { display: none; text-align: center; padding: 80px 20px; font-family: var(--font-sans); color: var(--text-secondary); }
    @media (max-width: 900px) {
      #sidebar-toggle { display: flex; }
      #sidebar { transform: translateX(-100%); box-shadow: 4px 0 24px rgba(0,0,0,0.4); }
      #sidebar.open { transform: translateX(0); }
      #overlay.open { display: block; }
      #main { margin-left: 0; padding: 60px 20px 40px; }
      h1 { font-size: 1.6em; } h2 { font-size: 1.3em; } h3 { font-size: 1.1em; }
      table { font-size: 0.78em; } th, td { padding: 6px 8px; }
    }
  </style>
</head>
<body>
  <button id="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle navigation">☰</button>
  <div id="overlay" onclick="closeSidebar()"></div>
  
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">Contents</div>
      <nav id="toc"></nav>
    </aside>
    <main id="main">
      <div id="loading">Rendering document</div>
      <div id="error" style="display:none;"></div>
      <div id="content" style="display:none;"></div>
      <div id="footer">
        <p>The Hierarchical Universe — A self-contained geometric framework. Dedicated to the public domain.</p>
      </div>
    </main>
  </div>

  <script>
    // Sidebar
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('open');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('open');
    }

    // Table of Contents
    function buildTOC(container) {
      var toc = document.getElementById('toc');
      var headings = container.querySelectorAll('h2, h3');
      headings.forEach(function(heading, idx) {
        if (!heading.id) heading.id = 'heading-' + idx;
        var a = document.createElement('a');
        a.href = '#' + heading.id;
        a.textContent = heading.textContent;
        a.onclick = function(e) {
          e.preventDefault(); closeSidebar();
          document.getElementById(heading.id).scrollIntoView({ behavior: 'smooth' });
          history.pushState(null, null, '#' + heading.id);
        };
        a.className = (heading.tagName === 'H2') ? 'toc-part' : 'toc-section';
        toc.appendChild(a);
      });
    }

    // Scroll spy
    function setupScrollSpy() {
      var headings = document.querySelectorAll('#content h2, #content h3');
      var links = document.querySelectorAll('#toc a');
      if (!headings.length || !links.length) return;
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            links.forEach(function(l) { l.classList.remove('active'); });
            var a = document.querySelector('#toc a[href="#' + entry.target.id + '"]');
            if (a) a.classList.add('active');
          }
        });
      }, { rootMargin: '-80px 0px -70% 0px' });
      headings.forEach(function(h) { observer.observe(h); });
    }

    // --- Main ---
    (function() {
      var contentDiv = document.getElementById('content');
      var loadingDiv = document.getElementById('loading');
      var errorDiv   = document.getElementById('error');

      // 1) Fetch markdown, render to HTML
      function showError(msg) {
        loadingDiv.style.display = 'none';
        errorDiv.style.display = 'block';
        errorDiv.textContent = msg;
      }

      function renderAfterMathJax() {
        // Wait until MathJax is truly ready
        if (window.MathJax && MathJax.typesetPromise) {
          MathJax.typesetPromise([contentDiv]).then(function() {
            console.log('MathJax typesetting complete');
          }).catch(function(err) {
            console.error('MathJax error:', err);
          });
        } else {
          // MathJax not ready yet — poll
          setTimeout(renderAfterMathJax, 100);
        }
      }

      fetch('content.md')
        .then(function(resp) {
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          return resp.text();
        })
        .then(function(raw) {
          // Configure marked
          marked.setOptions({ gfm: true, breaks: false, headerIds: true, mangle: false });
          var html = marked.parse(raw);

          contentDiv.innerHTML = html;
          contentDiv.style.display = 'block';
          loadingDiv.style.display = 'none';

          buildTOC(contentDiv);
          setupScrollSpy();

          // 2) Let MathJax render the math
          renderAfterMathJax();
        })
        .catch(function(err) {
          showError('Failed to load document: ' + err.message + '. Ensure content.md is in the repository.');
          console.error(err);
        });
    })();
  </script>
</body>
</html>
